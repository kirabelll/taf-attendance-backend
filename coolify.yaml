# Coolify deployment configuration for TAF Attendance Backend
# This file helps Coolify understand how to deploy your application

version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - DJANGO_SETTINGS_MODULE=taf_attendance.settings_production
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/test-connection/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

# Coolify-specific labels for automatic configuration
labels:
  - "coolify.managed=true"
  - "coolify.type=application"
  - "coolify.name=taf-attendance-backend"
  - "coolify.port=8000"
  - "coolify.healthcheck.enabled=true"
  - "coolify.healthcheck.path=/api/test-connection/"
  - "coolify.healthcheck.port=8000"
  - "coolify.healthcheck.interval=30s"