# Production Docker Compose for Coolify
version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - taf-network

  # Django Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: always
    environment:
      # Database
      DATABASE_ENGINE: django.db.backends.postgresql
      DATABASE_NAME: ${POSTGRES_DB}
      DATABASE_USER: ${POSTGRES_USER}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      
      # Django
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_DEBUG: "False"
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS}
      
      # ZKBio Time
      BIOTIME_URL: ${BIOTIME_URL}
      BIOTIME_USERNAME: ${BIOTIME_USERNAME}
      BIOTIME_PASSWORD: ${BIOTIME_PASSWORD}
      BIOTIME_API_VERSION: ${BIOTIME_API_VERSION}
      
      # Integration
      INTEGRATION_MODE: ${INTEGRATION_MODE}
      SYNC_INTERVAL_MINUTES: ${SYNC_INTERVAL_MINUTES}
      MAX_RETRIES: ${MAX_RETRIES}
      BATCH_SIZE: ${BATCH_SIZE}
      LOG_LEVEL: ${LOG_LEVEL}
      
    volumes:
      - backend_logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
    networks:
      - taf-network
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/api/test-connection/', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # React Frontend with Nginx
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend.simple
    restart: always
    depends_on:
      - backend
    networks:
      - taf-network
    ports:
      - "${PORT:-80}:80"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

volumes:
  postgres_data:
    driver: local
  backend_logs:
    driver: local

networks:
  taf-network:
    driver: bridge
