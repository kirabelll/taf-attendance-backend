version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: taf-attendance-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-taf_attendance}
      POSTGRES_USER: ${POSTGRES_USER:-taf_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-taf_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - taf-network

  # Django Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: taf-attendance-backend
    restart: unless-stopped
    environment:
      # Database Configuration
      DATABASE_ENGINE: django.db.backends.postgresql
      DATABASE_NAME: ${POSTGRES_DB:-taf_attendance}
      DATABASE_USER: ${POSTGRES_USER:-taf_user}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-changeme123}
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      
      # Django Settings
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-your-secret-key-change-in-production}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-False}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-*}
      
      # ZKBio Time Configuration
      BIOTIME_URL: ${BIOTIME_URL}
      BIOTIME_USERNAME: ${BIOTIME_USERNAME}
      BIOTIME_PASSWORD: ${BIOTIME_PASSWORD}
      BIOTIME_API_VERSION: ${BIOTIME_API_VERSION:-v1}
      
      # ERPNext Configuration (optional)
      ERPNEXT_URL: ${ERPNEXT_URL:-}
      ERPNEXT_API_KEY: ${ERPNEXT_API_KEY:-}
      ERPNEXT_API_SECRET: ${ERPNEXT_API_SECRET:-}
      
      # Integration Mode
      INTEGRATION_MODE: ${INTEGRATION_MODE:-biotime}
      
      # Sync Settings
      SYNC_INTERVAL_MINUTES: ${SYNC_INTERVAL_MINUTES:-1}
      MAX_RETRIES: ${MAX_RETRIES:-3}
      BATCH_SIZE: ${BATCH_SIZE:-100}
      
      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      
    volumes:
      - ./logs:/app/logs
      - ./db.sqlite3:/app/db.sqlite3
    depends_on:
      db:
        condition: service_healthy
    networks:
      - taf-network
    ports:
      - "8000:8000"

  # React Frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: taf-attendance-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    depends_on:
      - backend
    networks:
      - taf-network
    ports:
      - "80:80"

volumes:
  postgres_data:
    driver: local

networks:
  taf-network:
    driver: bridge
