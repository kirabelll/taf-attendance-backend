version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-taf_attendance}
      POSTGRES_USER: ${POSTGRES_USER:-taf_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-taf_password_2024}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-taf_user} -d ${POSTGRES_DB:-taf_attendance}"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - taf-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_password_2024}
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-redis_password_2024}", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - taf-network

  # Django Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      # Django Settings
      - DJANGO_SETTINGS_MODULE=taf_attendance.settings_production
      - DEBUG=${DEBUG:-False}
      - SECRET_KEY=${SECRET_KEY}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1}
      
      # Database Configuration
      - DATABASE_URL=postgresql://${POSTGRES_USER:-taf_user}:${POSTGRES_PASSWORD:-taf_password_2024}@db:5432/${POSTGRES_DB:-taf_attendance}
      
      # Redis Configuration
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_password_2024}@redis:6379/0
      
      # BioTime Configuration
      - BIOTIME_URL=${BIOTIME_URL}
      - BIOTIME_USERNAME=${BIOTIME_USERNAME}
      - BIOTIME_PASSWORD=${BIOTIME_PASSWORD}
      
      # Email Configuration (Optional)
      - EMAIL_HOST=${EMAIL_HOST:-}
      - EMAIL_PORT=${EMAIL_PORT:-587}
      - EMAIL_USE_TLS=${EMAIL_USE_TLS:-True}
      - EMAIL_HOST_USER=${EMAIL_HOST_USER:-}
      - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD:-}
      
      # Security
      - SECURE_SSL_REDIRECT=${SECURE_SSL_REDIRECT:-False}
      - SESSION_COOKIE_SECURE=${SESSION_COOKIE_SECURE:-False}
      - CSRF_COOKIE_SECURE=${CSRF_COOKIE_SECURE:-False}
    
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media
      - ./logs:/app/logs
    
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/test-connection/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    networks:
      - taf-network

  # Celery Worker (Background Tasks)
  celery:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A taf_attendance worker --loglevel=info --concurrency=2
    environment:
      # Django Settings
      - DJANGO_SETTINGS_MODULE=taf_attendance.settings_production
      - DEBUG=${DEBUG:-False}
      - SECRET_KEY=${SECRET_KEY}
      
      # Database Configuration
      - DATABASE_URL=postgresql://${POSTGRES_USER:-taf_user}:${POSTGRES_PASSWORD:-taf_password_2024}@db:5432/${POSTGRES_DB:-taf_attendance}
      
      # Redis Configuration
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_password_2024}@redis:6379/0
      
      # BioTime Configuration
      - BIOTIME_URL=${BIOTIME_URL}
      - BIOTIME_USERNAME=${BIOTIME_USERNAME}
      - BIOTIME_PASSWORD=${BIOTIME_PASSWORD}
    
    volumes:
      - ./logs:/app/logs
    
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    
    networks:
      - taf-network

  # Nginx Reverse Proxy (Optional - Coolify can handle this)
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_files:/var/www/static:ro
      - media_files:/var/www/media:ro
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - taf-network

volumes:
  postgres_data:
  redis_data:
  static_files:
  media_files:

networks:
  taf-network:
    driver: bridge